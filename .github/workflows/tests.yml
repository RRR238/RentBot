name: Tests

on:
  pull_request:
    branches:
      - main

jobs:
  scrapping-tests:
    name: Scrapping unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --upgrade pip
          pip install \
            pytest \
            beautifulsoup4 \
            lxml \
            requests \
            pydantic \
            langdetect \
            python-dotenv

      - name: Run scrapping tests
        run: |
          pytest Tests/Scrapping/ -v --tb=short
